<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#080810"/>
  <!-- Scales of justice — simplified for favicon size -->
  <!-- Vertical pole -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="11" y1="26" x2="21" y2="26" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top pivot -->
  <circle cx="16" cy="6" r="1.2" fill="#c9a227"/>
  <!-- Beam -->
  <line x1="7" y1="11" x2="25" y2="11" stroke="#c9a227" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="16" cy="11" r="1" fill="#c9a227"/>
  <!-- Left chain + pan -->
  <line x1="8" y1="11" x2="8" y2="18" stroke="#c9a227" stroke-width="1" stroke-linecap="round"/>
  <path d="M4 19.5 Q8 17.5 12 19.5 Q8 21.5 4 19.5Z" fill="#c9a227"/>
  <!-- Right chain + pan -->
  <line x1="24" y1="11" x2="24" y2="18" stroke="#c9a227" stroke-width="1" stroke-linecap="round"/>
  <path d="M20 19.5 Q24 17.5 28 19.5 Q24 21.5 20 19.5Z" fill="#c9a227"/>
</svg>
